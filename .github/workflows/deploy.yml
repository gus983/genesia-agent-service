name: Deploy genesia-agent-service

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: genesia-agent-service-deploy
  cancel-in-progress: true

env:
  DEPLOY_DIR: /opt/stacks/genesia-agent-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        shell: bash
        run: |
          set -euxo pipefail
          install -d -m 700 "$HOME/.ssh"
          echo "${{ secrets.VPS_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" || true
      
      - name: Debug SSH target
        shell: bash
        run: |
          echo "HOST=${{ secrets.VPS_HOST }}"
          echo "USER=${{ secrets.VPS_USER }}"
          
      - name: Rsync repo to VPS (${{ env.DEPLOY_DIR }})
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --filter='P .env.runtime' \
            -e "ssh -i $HOME/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_DIR }}/

      - name: Preflight
        shell: bash
        run: |
          ssh -i $HOME/.ssh/id_ed25519 -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail; \
             test -f ${{ env.DEPLOY_DIR }}/docker-compose.yml; \
             test -f ${{ env.DEPLOY_DIR }}/src/server.js; \
             test -f ${{ env.DEPLOY_DIR }}/.env.runtime; \
             echo Preflight OK"

      - name: Deploy (smart recreate) + smoke test
        shell: bash
        run: |
          set -euo pipefail

          NEED_BUILD=0
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | egrep -q '^(Dockerfile|package\.json|package-lock\.json)$'; then
            NEED_BUILD=1
          fi
          echo "NEED_BUILD=$NEED_BUILD"

          SSH_BASE="ssh -i $HOME/.ssh/id_ed25519 -p '${{ secrets.VPS_SSH_PORT }}' '${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}'"
          eval "$SSH_BASE" "set -euo pipefail; echo HOST: \$(hostname); echo WHO: \$(whoami); pwd; ls -la /opt/stacks; ls -ld '${{ env.DEPLOY_DIR }}' || true"
          if [ "$NEED_BUILD" -eq 1 ]; then
            eval "$SSH_BASE" "set -euo pipefail; cd '${{ env.DEPLOY_DIR }}' || (echo 'DEPLOY_DIR missing'; ls -la /opt/stacks; exit 2); docker compose -f docker-compose.yml up -d --build --force-recreate"
          else
            eval "$SSH_BASE" "set -euo pipefail; cd '${{ env.DEPLOY_DIR }}' || (echo 'DEPLOY_DIR missing'; ls -la /opt/stacks; exit 2); docker compose -f docker-compose.yml up -d --force-recreate"
          fi

          eval "$SSH_BASE" "curl -fsS http://127.0.0.1:4020/health >/dev/null; echo OK: deployed and healthy"