name: Deploy genesia-agent-service

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: genesia-agent-service-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euxo pipefail
          install -d -m 700 "$HOME/.ssh"
          echo "${{ secrets.VPS_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" || true

      - name: Rsync repo to VPS (/opt/stacks/genesia-agent-service)
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --filter='P .env.runtime' \
            -e "ssh -i $HOME/.ssh/id_ed25519 -p ${{ secrets.VPS_SSH_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/stacks/genesia-agent-service/

      - name: Preflight
        shell: bash
        run: |
          ssh -i $HOME/.ssh/id_ed25519 -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail; \
             test -f /opt/stacks/genesia-agent-service/docker-compose.yml; \
             test -f /opt/stacks/genesia-agent-service/src/server.js; \
             test -f /opt/stacks/genesia-agent-service/.env.runtime; \
             echo Preflight OK"

      - name: Deploy (smart recreate) + smoke test
        shell: bash
        run: |
          set -euo pipefail

          NEED_BUILD=0
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | egrep -q '^(Dockerfile|package\.json|package-lock\.json)$'; then
            NEED_BUILD=1
          fi
          echo "NEED_BUILD=$NEED_BUILD"

          SSH_BASE="ssh -i $HOME/.ssh/id_ed25519 -p '${{ secrets.VPS_SSH_PORT }}' '${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}'"

          if [ "$NEED_BUILD" -eq 1 ]; then
            eval "$SSH_BASE" "set -euo pipefail; cd /opt/stacks/genesia-agent-service; docker compose -f docker-compose.yml up -d --build --force-recreate"
          else
            eval "$SSH_BASE" "set -euo pipefail; cd /opt/stacks/genesia-agent-service; docker compose -f docker-compose.yml up -d --force-recreate"
          fi

          eval "$SSH_BASE" "curl -fsS http://127.0.0.1:4020/health >/dev/null; echo OK: deployed and healthy"