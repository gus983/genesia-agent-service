services:
  genesia-agent-service:
    container_name: genesia-agent-service
    build:
      context: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:4020:4020"
    env_file:
      - /opt/stacks/genesia-agent-service/.env.runtime
      - /home/agent/.genesia/secrets.env
    environment:
      - AGENT_PORT=4020
      - AGENT_BIND=0.0.0.0
    networks:
      - wa-net
      - postgres_default

networks:
  wa-net:
    external: true
  postgres_default:
    external: true
